run:
  timeout: 2m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/fwardzic/mcast-test-app

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
