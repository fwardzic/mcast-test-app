apiVersion: v1
kind: Pod
metadata:
  name: mcast-receiver
  labels:
    app: mcast-receiver
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/os: linux
  containers:
  - name: receiver
    image: mcast-test-app:latest
    imagePullPolicy: IfNotPresent
    command: ["receiver"]
    args: ["--group", "239.1.1.1", "--port", "5000"]
    resources:
      requests:
        cpu: "50m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "64Mi"
    # connect later without restarting the pod.
    stdin: true
    tty: true
    securityContext:
      capabilities:
        add:
          - NET_RAW
          - NET_ADMIN
