# Kubernetes Pod manifest for the multicast sender.
# Deploy with: kubectl apply -f k8s/sender.yaml
# Remove with: kubectl delete -f k8s/sender.yaml
#
# The sender transmits sequenced ticker-style payloads to one or more
# multicast groups so that multicast routing in the cluster can be verified.
apiVersion: v1
kind: Pod
metadata:
  name: mcast-sender
  labels:
    app: mcast-sender
spec:
  # hostNetwork: true — bypass the pod overlay network and use the node's
  # physical/bond interface directly.  Most CNI plugins do not forward
  # multicast between pod namespaces, so host networking is required for
  # IGMP reports to reach the router and for multicast traffic to flow.
  hostNetwork: true
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/os: linux
  # Ensure sender and receiver never land on the same node, which would
  # cause a port 5000 conflict since both use hostNetwork.
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: mcast-receiver
        topologyKey: kubernetes.io/hostname
  containers:
  - name: sender
    image: mcast-test-app:latest
    # Use IfNotPresent to avoid pulling from a registry. Load the image
    # locally first with: kind load docker-image mcast-test-app:latest
    # Or push to a registry and update the image reference accordingly.
    imagePullPolicy: IfNotPresent
    command: ["sender"]
    args: ["--group", "239.1.1.1", "--port", "5000", "--rate", "1"]
    resources:
      requests:
        cpu: "50m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "64Mi"
    securityContext:
      capabilities:
        add:
          # NET_RAW   — needed to create raw IP sockets for sending multicast
          #             datagrams and for setting IP_MULTICAST_TTL.
          # NOTE: NET_ADMIN is NOT required for the sender. Setting
          # IP_MULTICAST_TTL and IP_MULTICAST_IF are ordinary setsockopt
          # calls that do not need elevated capabilities.
          - NET_RAW
