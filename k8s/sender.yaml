apiVersion: v1
kind: Pod
metadata:
  name: mcast-sender
  labels:
    app: mcast-sender
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/os: linux
  containers:
  - name: sender
    image: mcast-test-app:latest
    imagePullPolicy: IfNotPresent
    command: ["sender"]
    args: ["--group", "239.1.1.1", "--port", "5000", "--rate", "1"]
    resources:
      requests:
        cpu: "50m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "64Mi"
    securityContext:
      capabilities:
        add:
          - NET_RAW
